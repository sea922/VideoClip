services:
  # ─────────────────────────────────────────────
  # Frontend — React/Vite SPA
  # ─────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    environment:
      - VITE_API_URL=http://localhost:3000
    depends_on:
      - backend
    networks:
      - app-network
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.05"

  # ─────────────────────────────────────────────
  # Backend — NestJS REST API + BullMQ
  # ─────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - WORKER_URL=http://worker:8000
      - STORAGE_ENDPOINT=http://minio:9000
      - STORAGE_BUCKET=video-editor-storage
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin
      - AWS_REGION=us-east-1
      - PRESIGNED_URL_EXPIRY_SECONDS=900
      - MAX_CONCURRENT_JOBS=1
      - QUEUE_MAX_DEPTH=10
    depends_on:
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - app-network
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.10"

  # ─────────────────────────────────────────────
  # Worker — Python FastAPI + FFmpeg + yt-dlp
  # ─────────────────────────────────────────────
  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - STORAGE_ENDPOINT=http://minio:9000
      - STORAGE_BUCKET=video-editor-storage
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin
      - AWS_REGION=us-east-1
      - MAX_FILESIZE_MB=1000
      - MAX_VIDEO_SECONDS=3600
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - app-network
    deploy:
      resources:
        limits:
          memory: 600M
          cpus: "0.5"

  # ─────────────────────────────────────────────
  # Redis — BullMQ queue + metadata store
  # ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 60mb --maxmemory-policy allkeys-lru
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: "0.5"

  # ─────────────────────────────────────────────
  # MinIO — S3-compatible object store (local dev)
  # Production: replace STORAGE_ENDPOINT with S3 URL
  # ─────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    volumes:
      - minio-data:/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  # ─────────────────────────────────────────────
  # MinIO Init — creates bucket + lifecycle policy
  # Runs once on startup then exits
  # ─────────────────────────────────────────────
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - app-network
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb local/video-editor-storage --ignore-existing &&
      mc ilm import local/video-editor-storage <<EOF
      {
        \"Rules\": [{
          \"ID\": \"auto-expire-2h\",
          \"Status\": \"Enabled\",
          \"Expiration\": { \"Days\": 1 }
        }]
      }
      EOF
      echo 'MinIO bucket ready.'
      "
    restart: "no"

networks:
  app-network:
    driver: bridge

volumes:
  minio-data:
    driver: local
