services:
  # ─────────────────────────────────────────────
  # Frontend — React/Vite SPA
  # ─────────────────────────────────────────────
  frontend:
    build:
      context: ../frontend
      dockerfile: ../docker/frontend.Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-http://localhost:3000}
    env_file:
      - ../frontend/.env
    ports:
      - "5173:80"
    depends_on:
      - backend
    networks:
      - app-network
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.05"

  # ─────────────────────────────────────────────
  # Backend — NestJS REST API + BullMQ
  # ─────────────────────────────────────────────
  backend:
    build:
      context: ../backend
      dockerfile: ../docker/backend.Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - ../backend/.env
    depends_on:
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - app-network
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.10"

  # ─────────────────────────────────────────────
  # Worker — Python FastAPI + FFmpeg + yt-dlp
  # ─────────────────────────────────────────────
  worker:
    build:
      context: ../worker
      dockerfile: ../docker/worker.Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ../worker/.env
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - app-network
    deploy:
      resources:
        limits:
          memory: 600M
          cpus: "0.5"

  # ─────────────────────────────────────────────
  # Redis — BullMQ queue + metadata store
  # ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 60mb --maxmemory-policy allkeys-lru --save 60 1
    volumes:
      - redis-data:/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: "0.5"

  # ─────────────────────────────────────────────
  # MinIO — S3-compatible object store (local dev)
  # Production: replace STORAGE_ENDPOINT with S3 URL
  # ─────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    env_file:
      - minio.env
    volumes:
      - minio-data:/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  # ─────────────────────────────────────────────
  # MinIO Init — creates bucket + lifecycle policy
  # Runs once on startup then exits
  # ─────────────────────────────────────────────
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - app-network
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb local/video-editor-storage --ignore-existing &&
      mc ilm import local/video-editor-storage <<EOF
      {
        \"Rules\": [{
          \"ID\": \"auto-expire-2h\",
          \"Status\": \"Enabled\",
          \"Expiration\": { \"Days\": 1 }
        }]
      }
      EOF
      echo 'MinIO bucket ready.'
      "
    restart: "no"

networks:
  app-network:
    driver: bridge

volumes:
  minio-data:
    driver: local
  redis-data:
    driver: local
